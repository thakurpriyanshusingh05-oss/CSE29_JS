<!DOCTYPE html>
<html>
<head>
    <title>Vowel or Consonant Checker</title>
</head>
<body>

<h2>Vowel or Consonant Checker</h2>

<script>
let ch = prompt("Enter a character:");

ch = ch.toLowerCase();

if (ch == 'a' || ch == 'e' || ch == 'i' || ch == 'o' || ch == 'u') {
    document.write(ch + " is a Vowel");
} else {
    document.write(ch + " is a Consonant");
}
</script>

</body>
</html>
